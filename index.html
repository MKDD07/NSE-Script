<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSE Live | Institutional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        syne: ['Syne', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        nseBlue: '#003399',
                        nseGreen: '#00a364',
                        nseRed: '#e11d48',
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f1f5f9; background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .ticker-animate { animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 1s infinite linear; }
        
        /* Skeleton Animation */
        .skel-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="font-sans text-slate-900 antialiased">

<div class="max-w-7xl mx-auto px-4 py-6 md:py-10">
    
    <header class="glass rounded-3xl p-6 shadow-xl shadow-slate-200/50 flex flex-col md:flex-row items-center justify-between gap-6 mb-8 border border-white">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-nseBlue rounded-2xl flex items-center justify-center text-white font-syne text-2xl font-extrabold shadow-lg shadow-blue-200">N</div>
            <div>
                <h1 class="font-syne text-2xl font-extrabold tracking-tight">NSE<span class="text-nseBlue">LIVE</span></h1>
                <p class="text-[10px] uppercase tracking-widest font-bold text-slate-400">Institutional Data Feed</p>
            </div>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4">
            <div id="market-status-badge" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 border border-slate-200 text-xs font-bold transition-all">
                <span class="w-2 h-2 rounded-full bg-slate-400" id="status-dot"></span>
                <span id="status-text">CONNECTING</span>
            </div>
            
            <div class="flex items-center gap-2 text-slate-400 font-mono text-[11px] bg-white px-3 py-2 rounded-lg border border-slate-100">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="last-update-time">--:--:--</span>
            </div>

            <button onclick="loadAll()" id="refresh-btn" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-5 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 shadow-sm active:scale-95 transition-all">
                <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh
            </button>
        </div>
    </header>

    <div id="ticker-wrap" class="hidden glass border-white overflow-hidden rounded-2xl mb-8 shadow-sm">
        <div id="ticker-tape" class="ticker-animate flex whitespace-nowrap py-3"></div>
    </div>

    <div id="indices-strip" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
        </div>

    <div class="glass border-white rounded-3xl p-8 mb-8 shadow-lg">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-1.5 h-6 bg-nseBlue rounded-full"></div>
            <h2 class="font-syne text-lg font-bold">Terminal Search</h2>
        </div>
        <div class="flex flex-col md:flex-row gap-3">
            <div class="relative flex-1">
                <input type="text" id="quote-input" onkeydown="if(event.key==='Enter') fetchQuote()" 
                    class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 text-sm font-medium focus:border-nseBlue focus:bg-white outline-none transition-all uppercase placeholder:normal-case" 
                    placeholder="Search stocks (e.g., RELIANCE, TCS)...">
            </div>
            <button onclick="fetchQuote()" class="bg-nseBlue text-white px-8 py-4 rounded-2xl font-bold text-sm hover:bg-blue-800 transition-all shadow-lg shadow-blue-100">
                FETCH DATA
            </button>
        </div>
        <div id="quote-result" class="mt-6"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/40 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex items-center justify-between bg-emerald-50/30">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-emerald-500 rounded-lg text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    </div>
                    <h3 class="font-syne font-bold">Top Gainers</h3>
                </div>
                <span id="gainer-count" class="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full">--</span>
            </div>
            <div id="gainers-list" class="divide-y divide-slate-50">
                </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/40 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex items-center justify-between bg-rose-50/30">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-rose-500 rounded-lg text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"></path></svg>
                    </div>
                    <h3 class="font-syne font-bold">Top Losers</h3>
                </div>
                <span id="loser-count" class="text-[10px] font-bold bg-rose-100 text-rose-700 px-3 py-1 rounded-full">--</span>
            </div>
            <div id="losers-list" class="divide-y divide-slate-50">
                </div>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-lg p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="p-2 bg-slate-800 rounded-lg text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <h3 class="font-syne font-bold text-slate-800">Most Active Volume</h3>
        </div>
        <div id="active-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </div>

    <footer class="mt-12 text-center text-slate-400 text-xs font-medium pb-10">
        <p>© 2026 NSE Live Terminal • Not Financial Advice • <a href="#" class="text-nseBlue hover:underline">Documentation</a></p>
    </footer>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const RENDER_URL = "https://nse-script-z8na.onrender.com"; 
const API_BASE = ((window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:5000"
    : RENDER_URL).replace(/\/+$/, "");

const fmt = (n) => n != null ? Number(n).toLocaleString("en-IN", {maximumFractionDigits: 2}) : "—";
const fmtPct = (n) => n != null ? (n > 0 ? "+" : "") + Number(n).toFixed(2) + "%" : "—";

async function api(path) {
    const res = await fetch(API_BASE + path);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

async function loadMarketStatus() {
    try {
        const d = await api("/api/market-status");
        const markets = d.data?.marketState || [];
        const cm = markets.find(m => m.market === "Capital Market" || m.market === "CM");
        const txt = document.getElementById("status-text");
        const dot = document.getElementById("status-dot");
        const badge = document.getElementById("market-status-badge");
        
        if (cm) {
            const isOpen = cm.marketStatus === "Open";
            txt.textContent = isOpen ? "MARKET OPEN" : "MARKET CLOSED";
            badge.className = isOpen 
                ? "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-50 border border-emerald-100 text-emerald-700 text-xs font-bold"
                : "flex items-center gap-2 px-4 py-2 rounded-full bg-rose-50 border border-rose-100 text-rose-700 text-xs font-bold";
            dot.className = `w-2 h-2 rounded-full ${isOpen ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`;
        }
    } catch(e) { console.error(e); }
}

async function loadIndices() {
    try {
        const d = await api("/api/indices");
        const strip = document.getElementById("indices-strip");
        strip.innerHTML = "";

        let tickerHtml = "";
        const tapeData = [...d.data, ...d.data];
        tapeData.forEach(idx => {
            const up = idx.pChange >= 0;
            const colorClass = up ? "text-emerald-600" : "text-rose-600";
            tickerHtml += `
                <div class="flex items-center gap-3 px-8 border-r border-slate-100">
                    <span class="font-bold text-slate-800 text-xs">${idx.name}</span>
                    <span class="font-mono text-xs ${colorClass}">${fmt(idx.last)}</span>
                    <span class="text-[10px] font-bold ${colorClass}">${fmtPct(idx.pChange)}</span>
                </div>`;
        });
        document.getElementById("ticker-tape").innerHTML = tickerHtml;
        document.getElementById("ticker-wrap").classList.remove("hidden");

        d.data.forEach(idx => {
            const up = idx.pChange >= 0;
            const div = document.createElement("div");
            div.className = "bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all group";
            div.innerHTML = `
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-2 group-hover:text-nseBlue transition-colors">${idx.name}</div>
                <div class="text-xl font-syne font-bold text-slate-800 mb-1">₹${fmt(idx.last)}</div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold ${up ? 'text-emerald-600' : 'text-rose-600'}">${fmtPct(idx.pChange)}</span>
                    <span class="text-[10px] text-slate-400">${up?'▲':'▼'} ${fmt(Math.abs(idx.change))}</span>
                </div>
            `;
            strip.appendChild(div);
        });
        document.getElementById("last-update-time").textContent = d.timestamp?.slice(11,19) || new Date().toLocaleTimeString();
    } catch(e) { console.error(e); }
}

async function loadGainersLosers() {
    try {
        const d = await api("/api/gainers-losers");
        const renderList = (arr, containerId, isUp) => {
            const el = document.getElementById(containerId);
            if (!arr || !arr.length) { el.innerHTML = '<div class="p-4 text-xs text-slate-400">No data available</div>'; return; }
            el.innerHTML = arr.slice(0, 8).map(s => `
                <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">
                    <div>
                        <div class="font-bold text-sm text-slate-800">${s.symbol}</div>
                        <div class="text-[10px] text-slate-400 font-mono">VOL: ${s.tradedQuantity ? Number(s.tradedQuantity).toLocaleString("en-IN") : "—"}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-sm text-slate-800">₹${fmt(s.ltp)}</div>
                        <div class="text-[11px] font-bold ${isUp ? 'text-emerald-600' : 'text-rose-600'}">${fmtPct(s.netPrice)}</div>
                    </div>
                </div>
            `).join("");
        };
        renderList(d.gainers, "gainers-list", true);
        renderList(d.losers, "losers-list", false);
        document.getElementById("gainer-count").textContent = (d.gainers?.length || 0) + " STOCKS";
        document.getElementById("loser-count").textContent = (d.losers?.length || 0) + " STOCKS";
    } catch(e) { console.error(e); }
}

async function loadMostActive() {
    try {
        const d = await api("/api/most-active");
        const grid = document.getElementById("active-grid");
        if (!d.data?.length) return;
        grid.innerHTML = d.data.slice(0, 12).map(s => `
            <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl text-center hover:bg-white hover:shadow-md transition-all cursor-default">
                <div class="text-[10px] font-bold text-slate-400 mb-1">${s.symbol}</div>
                <div class="text-sm font-bold text-slate-800">₹${fmt(s.ltp)}</div>
                <div class="text-[10px] font-bold ${s.netPrice >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${fmtPct(s.netPrice)}</div>
            </div>
        `).join("");
    } catch(e) { console.error(e); }
}

async function fetchQuote() {
    const sym = document.getElementById("quote-input").value.trim().toUpperCase();
    if (!sym) return;
    const el = document.getElementById("quote-result");
    el.innerHTML = `<div class="w-full h-32 skel-shimmer rounded-2xl"></div>`;
    try {
        const d = await api(`/api/quote/${sym}`);
        const up = d.pChange >= 0;
        el.innerHTML = `
            <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <div>
                        <h4 class="text-xl font-syne font-extrabold text-slate-800">${d.companyName || d.symbol}</h4>
                        <p class="text-xs font-mono text-slate-400">${d.symbol} • NSE INDIA</p>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-syne font-bold ${up ? 'text-emerald-600' : 'text-rose-600'}">₹${fmt(d.lastPrice)}</div>
                        <div class="text-sm font-bold ${up ? 'text-emerald-600' : 'text-rose-600'}">${fmtPct(d.pChange)} (${up?'+':''}${fmt(d.change)})</div>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    ${[
                        ['Open', fmt(d.open)], ['Prev Close', fmt(d.previousClose)],
                        ['Day High', fmt(d.high), 'text-emerald-600'], ['Day Low', fmt(d.low), 'text-rose-600'],
                        ['52W High', fmt(d.weekHighLow?.max)], ['52W Low', fmt(d.weekHighLow?.min)]
                    ].map(item => `
                        <div class="bg-white p-3 rounded-xl border border-slate-100">
                            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">${item[0]}</div>
                            <div class="text-sm font-bold ${item[2]||'text-slate-700'}">₹${item[1]}</div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    } catch(e) {
        el.innerHTML = `<div class="p-4 bg-rose-50 text-rose-600 rounded-xl text-xs font-bold border border-rose-100">SYMBOL NOT FOUND OR API OFFLINE</div>`;
    }
}

async function loadAll() {
    const btn = document.getElementById("refresh-btn");
    const icon = document.getElementById("refresh-icon");
    icon.classList.add("animate-spin-slow");
    await Promise.all([loadMarketStatus(), loadIndices(), loadGainersLosers(), loadMostActive()]);
    setTimeout(() => icon.classList.remove("animate-spin-slow"), 800);
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
